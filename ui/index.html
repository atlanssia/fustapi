<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FustAPI — Control Plane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--text-muted:#71717a;--accent:#6366f1;--accent-hover:#818cf8;--success:#22c55e;--warning:#eab308;--danger:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem}
header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
header h1{font-size:1.75rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);font-size:.875rem;margin-top:.25rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:.75rem 1.25rem;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:1.25rem;margin-bottom:1rem}
.card h3{font-size:.875rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.card h3 button{font-size:.75rem;padding:.3rem .75rem;background:var(--accent);color:#fff;border:none;border-radius:.25rem;cursor:pointer;font-weight:500}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:.625rem .75rem;border-bottom:1px solid var(--border);font-size:.8125rem}
th{color:var(--text-muted);font-weight:600;text-transform:uppercase;font-size:.6875rem;letter-spacing:.05em}
.badge{display:inline-block;padding:.125rem .5rem;border-radius:.25rem;font-size:.6875rem;font-weight:600}
.badge-ok{backgroundrgba(34,197,94,.15);colorvar(--success)}
.badge-nokey{backgroundrgba(234,179,8,.15);colorvar(--warning)}
.badge-type{backgroundrgba(99,102,241,.15);colorvar(--accent)}
.loading{text-align:center;padding:3rem;colorvar(--text-muted)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.375rem}
.status-dot.ok{backgroundvar(--success)}.status-dot.err{backgroundvar(--danger)}
.actions{display:flex;gap:.375rem}
.btn-sm{padding:.2rem .5rem;border:none;border-radius:.25rem;font-size:.6875rem;cursor:pointer;font-weight:500}
.btn-edit{backgroundrgba(99,102,241,.2);colorvar(--accent)}
.btn-del{backgroundrgba(239,68,68,.15);colorvar(--danger)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;backgroundrgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border:#fff;border-radius:.75rem;padding:#fff;width:#fff;max-width:#fff;max-height:#fff;overflow-y:auto}

/* Toast */
.toast-container{position:fixed;top:1rem;right:1rem;z-index:200;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1.25rem;border-radius:.5rem;color:#fff;font-size:.875rem;font-weight:500;animation:slideIn .3s ease-out}
.toast-success{background:#22c55e}.toast-error{background:#ef4444}.toast-warning{background:#eab308}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Form */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8125rem;font-weight:600;color:#71717a;margin-bottom:.375rem;text-transformuppercase;letter-spacing:.03em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.625rem .75rem;background:#f9fafb;border:#d1d5db;border-radius:.375rem;color:#374151;font-size:.875rem;font-familyinherit}

</style>

</head>

<body>

<div class="container">

  <header>

    <h1>FustAPI Control Plane</h1>

    <p>Manage providers, models, and routing</p>

  </header>

  <div class="tabs">

    <button class="tab active" data-tab="providers">Providers</button>

    <button class="tab" data-tab="models">Models</button>

    <button class="tab" data-tab="health">Health</button>

  </div>

  <!-- Providers Panel -->

  <div id="providers-panel" class="panel active">

    <div class="card">

      <h3>Providers <button onclick="openProviderModal()">+ Add Provider</button></h3>

      <div id="providers-loading" class="loading">Loading providers...</div>

      <table id="providers-table" style="display:none">

        <thead>

          <tr><th>Name</th><th>Type</th><th>Endpoint</th><th>API Key</th><th>Actions</th></tr>

    <!-- Provider Modal -->

    <div id="provider-modal" class="modal-overlay">

        <form id="provider-form">

          <input type="hidden" id="provider-id-old">

          <div class="form-group">

            <label for="provider-name">Name</label>

            <input type="text" id="provider-name" required placeholder="e.g., my-omlx">

          </div>

          <div class="form-group">

            <label for="provider-type">Type</label>

            <select id="provider-type" required>

              <option value="">Select type...</option>

              <option value="omlx">omlx</option>

              <option value="lmstudio">LM Studio</option>

              <option value="sglang">SGLang</option>

              <option value="openai">OpenAI</option>

              <option value="deepseek">DeepSeek</option>

            </select>

          </div>

          <div class="form-group">

            <label for="provider-endpoint">Endpoint</label>

            <input type="url" id="provider-endpoint" required placeholder="http://localhost:8000/v1">

          </div>

          <div class="form-group">

            <label for="provider-api-key">API Key (optional)</label>

            <input type="password" id="provider-api-key" placeholder="sk-...">

          </div>

            <button type="button" class="btn btn-secondary" onclick="closeProviderModal()">Cancel</button>


            <button type="submit" class="btn btn-primary" id="provider-submit-btn">Add Provider</button>


          </div>


        </form>


      </div>


    </div>


  </div>
