<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FustAPI — Control Plane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--text-muted:#71717a;--accent:#6366f1;--accent-hover:#818cf8;--success:#22c55e;--warning:#eab308;--danger:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem}
header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
header h1{font-size:1.75rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);font-size:.875rem;margin-top:.25rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:.75rem 1.25rem;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:1.25rem;margin-bottom:1rem}
.card h3{font-size:.875rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:.625rem .75rem;border-bottom:1px solid var(--border);font-size:.8125rem}
th{color:var(--text-muted);font-weight:600;text-transform:uppercase;font-size:.6875rem;letter-spacing:.05em}
td{color:var(--text)}
.badge{display:inline-block;padding:.125rem .5rem;border-radius:.25rem;font-size:.6875rem;font-weight:600;text-transform:uppercase}
.badge-ok{background:rgba(34,197,94,.15);color:var(--success)}
.badge-nokey{background:rgba(234,179,8,.15);color:var(--warning)}
.badge-unknown{background:rgba(113,113,122,.15);color:var(--text-muted)}
.loading{text-align:center;padding:3rem;color:var(--text-muted)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.375rem}
.status-dot.ok{background:var(--success)}
.status-dot.warn{background:var(--warning)}
.status-dot.err{background:var(--danger)}
footer{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);color:var(--text-muted);font-size:.75rem}
</style>
</head>
<body>
<div class="container">
<header>
<h1>FustAPI</h1>
<p>Local-first LLM API Gateway — Control Plane</p>
</header>

<div class="tabs">
<button class="tab active" data-tab="providers">Providers</button>
<button class="tab" data-tab="models">Models</button>
<button class="tab" data-tab="health">Health</button>
</div>

<div id="providers" class="panel active">
<div class="card">
<h3>Configured Providers</h3>
<table>
<thead><tr><th>Name</th><th>Endpoint</th><th>API Key</th><th>Status</th></tr></thead>
<tbody id="providers-body"><tr><td colspan="4" class="loading">Loading...</td></tr></tbody>
</table>
</div>
</div>

<div id="models" class="panel">
<div class="card">
<h3>Model Routing</h3>
<table>
<thead><tr><th>Model</th><th>Providers</th></tr></thead>
<tbody id="models-body"><tr><td colspan="2" class="loading">Loading...</td></tr></tbody>
</table>
</div>
</div>

<div id="health" class="panel">
<div class="card">
<h3>System Health</h3>
<div id="health-status" class="loading">Checking...</div>
</div>
</div>

<footer>FustAPI v0.1.0 — Single-binary LLM gateway</footer>
</div>

<script>
(function(){
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

// Tabs
$$('.tab').forEach(tab=>{tab.addEventListener('click',()=>{$$('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');$$('.panel').forEach(p=>p.classList.remove('active'));$( '#'+tab.dataset.tab).classList.add('active');});});

// Load providers
fetch('/api/providers').then(r=>r.json()).then(data=>{
const tb=$('#providers-body');
if(!data.providers||data.providers.length===0){tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">No providers configured. Run <code>fustapi config init</code>.</td></tr>';return;}
tb.innerHTML=data.providers.map(p=>`<tr><td>${esc(p.name)}</td><td><code>${esc(p.endpoint)}</code></td><td><span class="badge ${p.has_key?'badge-ok':'badge-nokey'}">${p.has_key?'Set':'None'}</span></td><td><span class="status-dot ok"></span>Active</td></tr>`).join('');
}).catch(()=>{$('#providers-body').innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--danger)">Failed to load providers</td></tr>';});

// Load models
fetch('/api/models').then(r=>r.json()).then(data=>{
const tb=$('#models-body');
if(!data.models||data.models.length===0){tb.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text-muted)">No models configured.</td></tr>';return;}
tb.innerHTML=data.models.map(m=>`<tr><td><code>${esc(m.id)}</code></td><td>${m.providers.map(p=>esc(p)).join(' → ')}</td></tr>`).join('');
}).catch(()=>{$('#models-body').innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--danger)">Failed to load models</td></tr>';});

// Load health
fetch('/health').then(r=>r.json()).then(data=>{$('#health-status').innerHTML=`<span class="status-dot ok"></span><strong>${esc(data.status)}</strong>`;}).catch(()=>{$('#health-status').innerHTML='<span class="status-dot err"></span><strong style="color:var(--danger)">Unhealthy</strong>';});

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
})();
</script>
</body>
</html>
